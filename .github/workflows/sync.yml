name: Notion -> Google Calendar Sync

on:
  schedule:
    # 15분마다 실행 (5분 간격은 GitHub이 더 심하게 지연/스로틀링하는 경향이 있어 완화 목적으로 조정)
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

# 이전 실행이 아직 끝나지 않았으면 새 실행은 취소하지 않고 대기시킨다.
# (동시에 두 실행이 같은 노션 일정을 처리하면서 캘린더 이벤트가 중복 생성되는 것을 방지)
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          CALENDAR_ID_WORK: ${{ secrets.CALENDAR_ID_WORK }}
          CALENDAR_ID_PERSONAL: ${{ secrets.CALENDAR_ID_PERSONAL }}
          CALENDAR_ID_DATE: ${{ secrets.CALENDAR_ID_DATE }}
          CALENDAR_ID_ANNIVERSARY: ${{ secrets.CALENDAR_ID_ANNIVERSARY }}
